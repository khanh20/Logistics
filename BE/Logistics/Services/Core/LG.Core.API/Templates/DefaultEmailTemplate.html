<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{title}}</title>
</head>
<body style='font-family: Arial, sans-serif; padding: 20px; background-color: #f5f5f5;'>
    <div style='max-width: 600px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);'>
        <div style='background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px 20px; text-align: center;'>
            <h1 style='margin: 0; font-size: 26px; font-weight: bold; letter-spacing: 1px;'>MuaHoLogistics</h1>
        </div> 
        <div style='padding: 30px; color: #333;'>
            <h2 style='color: #2c3e50; margin-top: 0; font-size: 20px;'>{{title}}</h2>
            <div style='color: #4a5568; line-height: 1.6; font-size: 15px; margin-top: 15px;'>
                {{body}}
            </div>
            <hr style='border: none; border-top: 1px solid #edf2f7; margin: 30px 0 20px 0;'/>
            <p style='color: #a0aec0; font-size: 12px; text-align: center; margin: 0;'>
                Email này được gửi tự động từ hệ thống MuaHoLogistics. Vui lòng không trả lời email này.
            </p>
        </div>
    </div>
</body>
</html>
