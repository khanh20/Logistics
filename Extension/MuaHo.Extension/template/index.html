<div class="muaho-sidebar" id="muaho-sidebar-bottom">
  <button class="muaho-close" title="Đóng">×</button>

  <div class="muaho-sidebar__brand">
    <img class="muaho-logo-img" alt="MuaHo" />
    <span class="muaho-logo">MuaHo</span>
  </div>

  <div class="muaho-login-banner" style="display: none">
    <p>Bạn chưa đăng nhập MuaHo.</p>
    <a class="muaho-btn-login" href="#" target="_blank">Đăng nhập để mua hộ</a>
  </div>

  <div class="muaho-sidebar__body">
    <div class="muaho-title" title=""></div>

    <div class="muaho-price-row">
      <span class="muaho-price-cny">—</span>
      <span class="muaho-price-vnd"></span>
    </div>
    <div class="muaho-rate"></div>

    <div class="muaho-warn" style="display: none">
      ⚠ Không chắc chắn dữ liệu — vui lòng kiểm tra lại giá & phân loại.
    </div>

    <div class="muaho-controls">
      <select class="muaho-category-select">
        <option value="">-- Chọn danh mục (tùy chọn) --</option>
      </select>
      <input class="muaho-qty" type="number" min="1" value="1" title="Số lượng" />
    </div>

    <button class="muaho-btn-add">
      <span class="muaho-btn-label">Thêm vào giỏ MuaHo</span>
      <span class="muaho-spinner"></span>
    </button>
    <a class="muaho-btn-view-cart" href="#" target="_blank">Xem giỏ hàng →</a>
  </div>
</div>
