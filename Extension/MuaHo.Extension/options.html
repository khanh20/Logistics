<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>MuaHo — Cài đặt</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: #1f2937;
        max-width: 520px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 {
        font-size: 20px;
        color: #f97316;
      }
      .field {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 6px;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        margin-top: 4px;
      }
      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      button {
        background: #f97316;
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved {
        color: #16a34a;
        font-size: 13px;
        margin-left: 12px;
      }
    </style>
  </head>
  <body>
    <h1>MuaHo — Cài đặt</h1>

    <div class="field">
      <label for="backendHost">Backend API URL</label>
      <input type="text" id="backendHost" placeholder="https://localhost:7167" />
      <div class="hint">Địa chỉ API Module1 của MuaHo (không có dấu / cuối).</div>
    </div>

    <div class="field">
      <label for="webHost">Web MuaHo URL</label>
      <input type="text" id="webHost" placeholder="http://localhost:5173" />
      <div class="hint">Dùng để mở trang giỏ hàng / đăng nhập.</div>
    </div>

    <div class="field">
      <label for="authHost">Auth API URL</label>
      <input type="text" id="authHost" placeholder="https://localhost:7237" />
      <div class="hint">Dùng để tự động làm mới token khi hết hạn.</div>
    </div>

    <div class="field checkbox">
      <input type="checkbox" id="isTranslate" />
      <label for="isTranslate" style="margin: 0">Dịch tên thuộc tính CN → VN</label>
    </div>

    <button id="save">Lưu cài đặt</button>
    <span class="saved" id="saved" style="display: none">Đã lưu ✓</span>

    <script src="js/options.js"></script>
  </body>
</html>
